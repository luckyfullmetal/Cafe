name: Sync Transformice Data
on:
  schedule:
    - cron: '*/15 * * * *' # Runs automatically every 15 minutes
  workflow_dispatch: # Allows you to run it manually with a click

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Run Fetch Script
      run: node fetch_tfm.js

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Actions Bot"
        git config --global user.email "actions@github.com"
        git add tfm_data.json
        git commit -m "Auto-updated TFM profile stats" || exit 0
        git push
