<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NameMC Skin Color Scanner for Roblox</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e1e24;
            color: #f5f5f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #2a2a35;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #00a2ff; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #111;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00a2ff;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
            transition: background 0.2s;
        }
        button:hover { background: #0082cc; }
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background: #15151c;
            border-left: 5px solid #ff3333;
            border-radius: 4px;
        }
        .color-preview {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            border: 2px solid #fff;
            display: inline-block;
            vertical-align: middle;
            margin-right: 15px;
        }
        .code-output {
            background: #000;
            padding: 8px;
            border-radius: 4px;
            font-family: monospace;
            color: #a6e22e;
            display: block;
            margin-top: 10px;
            cursor: pointer;
        }
        canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>Skin Color Scanner</h2>
    <p style="font-size: 0.9rem; color: #aaa; text-align: center;">Scans the designated red zone on your Minecraft skin texture and converts it into a Roblox Studio compatible format.</p>
    
    <label for="urlInput">NameMC / Skin Image URL:</label>
    <input type="text" id="urlInput" placeholder="https://texture.namemc.com/skin/...">
    
    <button onclick="processURL()">Scan from URL</button>
    
    <div style="text-align: center; margin: 15px 0; color: #777;">— OR —</div>
    
    <label for="fileInput">Upload Skin File Directly:</label>
    <input type="file" id="fileInput" accept="image/*" onchange="processFile(this)">

    <div class="result-box" id="resultBox" style="display: none;">
        <div style="display: flex; align-items: center;">
            <div class="color-preview" id="colorPreview"></div>
            <div>
                <strong>Detected Color:</strong> <span id="hexText">#000000</span>
            </div>
        </div>
        <label>Roblox Studio Pasteable Code (Click to Copy):</label>
        <span class="code-output" id="robloxCode" onclick="copyToClipboard()">Color3.fromRGB(255, 255, 255)</span>
    </div>
</div>

<canvas id="skinCanvas"></canvas>

<script>
    function processURL() {
        const url = document.getElementById('urlInput').value.trim();
        if (!url) return alert('Please enter a valid URL');
        
        // Using a public CORS proxy to bypass browser security blockers for external skin assets
        const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(url);
        
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.onload = () => scanSkin(img);
        img.onerror = () => alert("Failed to load image. If NameMC blocks the request, download the skin and use the file uploader below!");
        img.src = proxyUrl;
    }

    function processFile(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = () => scanSkin(img);
                img.src = e.target.result;
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function scanSkin(img) {
        const canvas = document.getElementById('skinCanvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        
        const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imgData.data;
        
        let targetR = 0, targetG = 0, targetB = 0;
        let found = false;

        // Based on the skin grid map, the targeted red custom pixel zone resides in the upper quadrant (Head region)
        // Scanning pixels looking for the dominant high-chroma red region matching your template
        for (let i = 0; i < data.length; i += 4) {
            let r = data[i];
            let g = data[i+1];
            let b = data[i+2];
            let a = data[i+3];

            // Filter for vibrant/pure red color profiles matching your target marker box
            if (r > 180 && g < 60 && b < 60 && a > 200) {
                targetR = r;
                targetG = g;
                targetB = b;
                found = true;
                break; // Grabs the first exact match within the designated template zone
            }
        }

        if (!found) {
            alert("Could not detect the pure red zone color block. Ensure you are using the correct marked template skin!");
            return;
        }

        // Convert to HEX string
        const hex = "#" + ((1 << 24) + (targetR << 16) + (targetG << 8) + targetB).toString(16).slice(1).toUpperCase();
        
        // Update UI
        document.getElementById('colorPreview').style.backgroundColor = hex;
        document.getElementById('hexText').innerText = `${hex} (RGB: ${targetR}, ${targetG}, ${targetB})`;
        document.getElementById('robloxCode').innerText = `Color3.fromRGB(${targetR}, ${targetG}, ${targetB})`;
        document.getElementById('resultBox').style.display = 'block';
    }

    function copyToClipboard() {
        const text = document.getElementById('robloxCode').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert('Copied to clipboard: ' + text);
        });
    }
</script>
</body>
</html>
