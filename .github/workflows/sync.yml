name: Dynamic Player Verification
on:
  repository_dispatch:
    types: [verify_user]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Run Verification Check
      env:
        TFM_USERNAME: ${{ github.event.client_payload.username }}
        VERIFY_CODE: ${{ github.event.client_payload.code }}
        ROBLOX_ID: ${{ github.event.client_payload.robloxId }}
      run: node fetch_tfm.js

    - name: Save Verification status
      run: |
        git config --global user.name "Verification Bot"
        git config --global user.email "actions@github.com"
        git add tfm_data.json
        git commit -m "Verified user: ${{ github.event.client_payload.username }}" || exit 0
        git push
